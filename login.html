<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>EduScore - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<header class="navbar login-navbar">
  <h1>EduScore</h1>

  <nav>
    <a href="index.html">Início</a>
    <a href="cadastro.html" class="signup-btn">Cadastre-se</a>
  </nav>
</header>

<main class="login-moderno">

  <section class="login-texto">
    <span class="tag-login">Portal acadêmico</span>

    <h2>Acesse sua área<br>de estudante.</h2>

    <p>
      Consulte notas, médias, matérias com dificuldade e exercícios
      recomendados para melhorar seu desempenho.
    </p>
  </section>

  <section class="auth-card login-glass">
    <h2>EduScore</h2>
    <p>Entre para continuar</p>

    <input type="text" id="nome" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

    <a href="cadastro.html">Não tenho conta</a>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
