<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>EduScore - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1>EduScore</h1>

  <nav>
    <a href="index.html">Início</a>
    <a href="login.html" class="login-btn">Entrar</a>
  </nav>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h2>EduScore</h2>
    <p>Crie sua conta acadêmica</p>

    <input type="text" id="cadNome" placeholder="Nome completo">
    <input type="email" id="cadEmail" placeholder="E-mail">
    <input type="password" id="cadSenha" placeholder="Senha">

    <button onclick="cadastrar()">Cadastrar</button>

    <a href="login.html">Já tenho conta</a>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
